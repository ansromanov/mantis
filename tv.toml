show_hidden = true
ignore_gitignore = true
tree_width = 20
word_wrap = true

# Git mode: show only changed files and their working-tree diffs.
# git_mode = false         # start in git mode (default: false)
# git_mode_flat = false    # start git mode in flat/plain list view (default: false)
# git_status = true        # colour tree by git status (default: true)
# git_show_deleted = false # show ghost nodes for deleted tracked files (default: false)

# Keybindings. Each action takes a list of key specs. A spec is a single
# character ("q", "?", "0") or a named key (Up, Down, Left, Right, Enter,
# Tab, Esc, Backspace, PageUp, PageDown, Home, End, Space), optionally
# prefixed with modifiers: "ctrl+c", "alt+.".
[keys]
# Global
quit = ["q", "ctrl+c"]
help = ["?"]
toggle_hidden = ["alt+."]
search_files = ["/"]
search_content = ["f"]
reload = ["r"]
switch_panel = ["Tab"]
file_history = ["H"]
theme_picker = ["t"]
git_mode_toggle = ["ctrl+g"]
git_mode_flat_toggle = ["alt+g"]

# Navigation (shared by tree and content panels)
nav_up = ["Up", "k"]
nav_down = ["Down", "j"]

# Tree panel
tree_expand = ["Enter", "Right", "l"]
tree_collapse = ["Left", "h"]

# Content panel
content_left = ["Left"]
content_right = ["Right"]
content_top = ["g"]
content_bottom = ["G"]
content_page_up = ["PageUp"]
content_page_down = ["PageDown"]
content_reset_col = ["0"]
toggle_wrap = ["z"]
toggle_raw_markdown = ["M"]
open_in_editor = ["e"]

# Theme. `name` selects a built-in preset (default, monokai, solarized,
# catppuccin, synthwave84) — also switchable live with the theme picker (t).
# Each role is a color name ("cyan", "lightyellow", "reset") or a hex value
# ("#aabbcc") and overrides the preset; `syntax` is a syntect theme name.
# [theme]
# name = "catppuccin"
# transparent_background = false  # true = use terminal's background instead of the preset's
# accent = "cyan"                 # focused borders, primary highlights
# accent_alt = "yellow"      # popup chrome, keys, prompts
# dim = "darkgray"           # unfocused borders, gutters, hints, rules
# text = "white"             # emphasized / default text
# dir = "blue"               # directory entries in the tree
# file = "reset"             # file entries in the tree
# selection_bg = "darkgray"  # selected row / status bar background
# selection_fg = "yellow"    # selected row foreground in popups
# heading1 = "lightcyan"     # markdown H1 / table headers
# heading2 = "lightyellow"   # markdown H2
# heading3 = "lightgreen"    # markdown H3
# code = "lightyellow"       # inline code / code blocks
# diff_add = "green"         # added lines in a diff
# diff_del = "red"           # removed lines in a diff
# syntax = "base16-ocean.dark"
