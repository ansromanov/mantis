name: Main

# Post-merge sanity on main: lint everything (clippy --all-targets compiles
# benches too), run only the tests related to the merge diff, and the e2e
# smoke. The full suite and Windows run on release (release.yml) and on
# demand (tests.yml); benchmarks run on release.
on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  sanity:
    name: clippy + related tests (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect code changes
        id: changes
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -qE '^(src/|tests/|benches/|Cargo\.(toml|lock)|mantis\.toml|themes/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          printf '%s\n' "$changed" > changed_files.txt

      - name: Install lld
        if: steps.changes.outputs.code == 'true'
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        if: steps.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        if: steps.changes.outputs.code == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Format
        if: steps.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.changes.outputs.code == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: Select related tests
        if: steps.changes.outputs.code == 'true'
        id: select
        run: |
          filter=$(bash scripts/related-tests.sh < changed_files.txt)
          echo "filter<<EOF" >> "$GITHUB_OUTPUT"
          echo "$filter" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Selected filter: $filter"

      - name: Run related tests
        if: steps.changes.outputs.code == 'true'
        env:
          FILTER: ${{ steps.select.outputs.filter }}
        run: |
          # Same selection as ci.yml: dedup the bin-target unit-test copies and
          # cap broad changes to the smoke set. Full suite runs on release.
          dedup='not (binary_id(mantis::bin/mantis) & !test(/^(tests|draw_tests)::/))'
          if [ "$FILTER" = "__ALL__" ]; then
            echo "Broad change — running smoke set instead of the full suite."
            cargo nextest run --profile ci --all -E "(kind(test) + kind(bin)) & $dedup"
          else
            cargo nextest run --profile ci --all -E "($FILTER) & $dedup"
          fi

      - name: Run E2E whole-binary smoke test
        if: steps.changes.outputs.code == 'true'
        run: python3 scripts/ci-e2e.py

      - name: Job summary
        if: steps.changes.outputs.code == 'true' && always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: target/nextest/ci/junit.xml
          detailed_summary: true
          include_passed: true
          check_name: Test Results
