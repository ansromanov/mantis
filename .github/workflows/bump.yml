name: Bump Version

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'mantis.toml'
  workflow_dispatch:

concurrency:
  group: main-version-writer
  cancel-in-progress: false

jobs:
  bump:
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Bump patch version, commit, and push
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2; do
            current=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            major=$(echo "$current" | cut -d. -f1)
            minor=$(echo "$current" | cut -d. -f2)
            patch=$(echo "$current" | cut -d. -f3)
            new_version="${major}.${minor}.$((patch + 1))"
            sed -i "s/^version = \"${current}\"/version = \"${new_version}\"/" Cargo.toml
            sed -i "/^name = \"mantis\"/{n;s/version = \"${current}\"/version = \"${new_version}\"/}" Cargo.lock
            sed -i "s/^version = \".*\"/version = \"${new_version}\"/" release-info.toml
            sed -i "s/^date = \".*\"/date = \"$(date +%Y-%m-%d)\"/" release-info.toml

            git add Cargo.toml Cargo.lock release-info.toml
            git commit -m "chore: bump version to v${new_version} [skip ci]"

            if git push origin HEAD:main; then
              echo "version=${new_version}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -eq 2 ]; then
              echo "Push failed after retry" >&2
              exit 1
            fi

            git reset --hard HEAD~1
            git pull --rebase origin main
          done
