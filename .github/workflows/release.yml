name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to bump before releasing (none = tag current version)
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none
      release_targets:
        description: Platforms to build and publish
        type: choice
        options:
          - all
          - mac-linux
          - windows
        default: all
      test_targets:
        description: Full test suite(s) to run before publishing (independent of release_targets)
        type: choice
        options:
          - all
          - linux
          - windows
          - none
        default: all
      runner:
        description: Runner for the core jobs (bump/test/bench/publish); build matrix always uses GitHub-hosted OS/arch runners
        type: choice
        options:
          - github-hosted
          - self-hosted
        default: github-hosted

concurrency:
  group: main-version-writer
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      update_homebrew: ${{ steps.set.outputs.update_homebrew }}
      run_linux_tests: ${{ steps.set.outputs.run_linux_tests }}
      run_windows_tests: ${{ steps.set.outputs.run_windows_tests }}
    steps:
      - id: set
        run: |
          linux_x86='{"os":"ubuntu-latest","target":"x86_64-unknown-linux-musl","artifact":"mantis-linux-x86_64"}'
          linux_arm='{"os":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-musl","artifact":"mantis-linux-aarch64"}'
          macos_arm='{"os":"macos-latest","target":"aarch64-apple-darwin","artifact":"mantis-macos-aarch64"}'
          macos_x86='{"os":"macos-latest","target":"x86_64-apple-darwin","artifact":"mantis-macos-x86_64"}'
          windows='{"os":"windows-latest","target":"x86_64-pc-windows-msvc","artifact":"mantis-windows-x86_64.exe"}'
          case "${{ inputs.release_targets }}" in
            mac-linux)
              matrix="[$linux_x86,$linux_arm,$macos_arm,$macos_x86]"
              update_homebrew=true
              ;;
            windows)
              matrix="[$windows]"
              update_homebrew=false
              ;;
            all|*)
              matrix="[$linux_x86,$linux_arm,$macos_arm,$macos_x86,$windows]"
              update_homebrew=true
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "update_homebrew=$update_homebrew" >> "$GITHUB_OUTPUT"

          case "${{ inputs.test_targets }}" in
            linux) run_linux_tests=true;  run_windows_tests=false ;;
            windows) run_linux_tests=false; run_windows_tests=true ;;
            none) run_linux_tests=false; run_windows_tests=false ;;
            all|*) run_linux_tests=true;  run_windows_tests=true ;;
          esac
          echo "run_linux_tests=$run_linux_tests" >> "$GITHUB_OUTPUT"
          echo "run_windows_tests=$run_windows_tests" >> "$GITHUB_OUTPUT"

  bump:
    runs-on: ${{ inputs.runner == 'self-hosted' && fromJSON('["self-hosted", "Linux"]') || 'ubuntu-latest' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
      changelog: ${{ steps.changelog.outputs.log }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Compute version
        id: version
        run: |
          current=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)
          case "${{ inputs.bump }}" in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="${major}.$((minor + 1)).0" ;;
            patch) new_version="${major}.${minor}.$((patch + 1))" ;;
            none|*) new_version="${current}" ;;
          esac
          if [ "$new_version" != "$current" ]; then
            sed -i "s/^version = \"${current}\"/version = \"${new_version}\"/" Cargo.toml
            sed -i "/^name = \"mantis\"/{n;s/version = \"${current}\"/version = \"${new_version}\"/}" Cargo.lock
          fi
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-version:refname | grep '^v' | head -1 || true)
          if [ -z "$prev_tag" ]; then
            log=$(git log --pretty=format:"- %s")
          else
            log=$(git log --pretty=format:"- %s" "${prev_tag}..HEAD")
          fi
          log=$(echo "$log" | grep -v "^- chore: bump version to v" || true)
          log=$(echo "$log" | sed 's/"""/\\"\\"\\"/g')
          {
            echo "log<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write release info
        run: |
          cat > release-info.toml << 'TOMLEOF'
          version = "${{ steps.version.outputs.version }}"
          date = "__RELEASE_DATE__"
          whats_new = """${{ steps.changelog.outputs.log }}"""
          release_url = "https://github.com/ansromanov/mantis/releases/tag/v${{ steps.version.outputs.version }}"
          TOMLEOF
          sed -i "s/__RELEASE_DATE__/$(date +%Y-%m-%d)/" release-info.toml

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock release-info.toml
          if git diff --cached --quiet; then
            echo "Nothing to commit (version and release notes unchanged)."
          else
            git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
            if ! git push origin HEAD:main; then
              git pull --rebase origin main
              git push origin HEAD:main
            fi
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Full validation runs here: complete test suite on Linux and Windows, the
  # e2e smoke, and the full benchmarks — all in parallel with the builds. PRs
  # and merges to main run only related-test subsets (ci.yml, main.yml).
  # tests.yml runs this same full suite on demand, decoupled from a release.
  test:
    name: full test suite + e2e (Linux)
    needs: [bump, plan]
    if: needs.plan.outputs.run_linux_tests == 'true'
    runs-on: ${{ inputs.runner == 'self-hosted' && fromJSON('["self-hosted", "Linux"]') || 'ubuntu-latest' }}
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run full test suite
        run: cargo nextest run --profile ci --all

      - name: Run E2E whole-binary smoke test
        run: python3 scripts/ci-e2e.py

  test-windows:
    name: full test suite (Windows)
    needs: [bump, plan]
    if: needs.plan.outputs.run_windows_tests == 'true'
    continue-on-error: true
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --all

  bench:
    name: full benchmarks
    needs: bump
    runs-on: ${{ inputs.runner == 'self-hosted' && fromJSON('["self-hosted", "Linux"]') || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run full benchmarks
        run: ./scripts/bench-report.sh

      - name: Write perf recap
        run: ./scripts/bench-summary.sh | tee bench-results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bench report
        uses: actions/upload-artifact@v4
        with:
          name: bench-report-v${{ needs.bump.outputs.version }}
          path: bench-results/

  build:
    needs: [bump, plan]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    # Windows binaries are best-effort: a failed Windows build never blocks the
    # release, since it can always be rebuilt and published in a later run.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/mantis"
          [[ "${{ runner.os }}" == "Windows" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: [bump, plan, build, test, test-windows, bench]
    # test-windows is best-effort (continue-on-error) and may also be skipped
    # entirely via test_targets, so its result is deliberately excluded here —
    # Windows never blocks the release. Everything else must succeed or be
    # explicitly skipped (test/bench are skipped only when the corresponding
    # input opts out).
    if: |
      always() &&
      needs.bump.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.bench.result == 'success'
    runs-on: ${{ inputs.runner == 'self-hosted' && fromJSON('["self-hosted", "Linux"]') || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.sha }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ needs.bump.outputs.version }}
          name: v${{ needs.bump.outputs.version }}
          target_commitish: ${{ needs.bump.outputs.sha }}
          body: |
            ## What's Changed

            ${{ needs.bump.outputs.changelog }}
          files: artifacts/*

      - name: Update Homebrew formula
        if: needs.plan.outputs.update_homebrew == 'true'
        run: |
          version="${{ needs.bump.outputs.version }}"
          sha_macos_arm=$(grep "mantis-macos-aarch64$" artifacts/SHA256SUMS | awk '{print $1}')
          sha_macos_x86=$(grep "mantis-macos-x86_64$"  artifacts/SHA256SUMS | awk '{print $1}')
          sha_linux_arm=$(grep "mantis-linux-aarch64$" artifacts/SHA256SUMS | awk '{print $1}')
          sha_linux_x86=$(grep "mantis-linux-x86_64$"  artifacts/SHA256SUMS | awk '{print $1}')

          sed -i "s/^  version \".*\"/  version \"${version}\"/" Formula/mantis.rb

          # Update sha256 values in order: macos-arm, macos-x86, linux-arm, linux-x86
          # Each block has exactly one sha256 line; replace them sequentially via awk
          awk -v shas="${sha_macos_arm} ${sha_macos_x86} ${sha_linux_arm} ${sha_linux_x86}" '
            BEGIN { n=0; split(shas, s, " ") }
            /sha256 "/ { n++; sub(/"[0-9a-f]+"/, "\"" s[n] "\"") }
            { print }
          ' Formula/mantis.rb > Formula/mantis.rb.tmp && mv Formula/mantis.rb.tmp Formula/mantis.rb

      - name: Commit updated formula
        if: needs.plan.outputs.update_homebrew == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mantis.rb
          git commit -m "chore: bump Homebrew formula to v${{ needs.bump.outputs.version }} [skip ci]"
          if ! git push origin HEAD:main; then
            git pull --rebase origin main
            git push origin HEAD:main
          fi
