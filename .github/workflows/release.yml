name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: tv-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tv-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tv-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tv-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/tv"
          [[ "${{ runner.os }}" == "Windows" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-version:refname | grep '^v' | head -1)
          if [ -z "$prev_tag" ]; then
            log=$(git log --pretty=format:"- %s")
          else
            log=$(git log --pretty=format:"- %s" "${prev_tag}..HEAD")
          fi
          log=$(echo "$log" | grep -v "^- chore: bump version to v")
          {
            echo "log<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.log }}
          files: artifacts/*
