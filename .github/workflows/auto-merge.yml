name: Auto-merge

# Enables GitHub's native auto-merge on every PR against main. Auto-merge only
# actually merges once branch protection is satisfied — required status
# checks green (see ci.yml) and conversations resolved (branch protection:
# required_conversation_resolution) — so this just removes the manual step of
# clicking "Enable auto-merge".
on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
