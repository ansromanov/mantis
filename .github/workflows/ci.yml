name: CI

# Pull-request gate: format, lint, and only the tests related to the changed
# files. The full suite, Windows, bench-smoke and coverage run elsewhere
# (main.yml on merge, coverage.yml on demand).
on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pr:
    name: fmt, clippy, related tests (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Link with lld in CI only (local builds keep the default linker).
      # Linux-only — the Windows job below uses the default MSVC linker.
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect code changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          changed=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate --jq '.[].filename')
          if echo "$changed" | grep -qE '^(src/|tests/|benches/|Cargo\.(toml|lock)|tv\.toml)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          # Stash the changed-file list for the related-tests step.
          printf '%s\n' "$changed" > changed_files.txt

      - name: Install lld
        if: steps.changes.outputs.code == 'true'
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        if: steps.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        if: steps.changes.outputs.code == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Format
        if: steps.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.changes.outputs.code == 'true'
        # Skip benches (criterion) on PRs — they are compile-checked in main.yml.
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Select related tests
        if: steps.changes.outputs.code == 'true'
        id: select
        run: |
          filter=$(bash scripts/related-tests.sh < changed_files.txt)
          echo "filter<<EOF" >> "$GITHUB_OUTPUT"
          echo "$filter" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Selected filter: $filter"

      - name: Run related tests
        if: steps.changes.outputs.code == 'true'
        run: |
          if [ "${{ steps.select.outputs.filter }}" = "__ALL__" ]; then
            echo "Running full suite (broad change detected)."
            cargo nextest run --profile ci --all
          else
            cargo nextest run --profile ci --all -E '${{ steps.select.outputs.filter }}'
          fi
