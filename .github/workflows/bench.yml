name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: full
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run full benchmarks
        run: ./scripts/bench-report.sh

      - name: Upload bench report
        uses: actions/upload-artifact@v4
        with:
          name: bench-report-${{ github.sha }}
          path: bench-results/
