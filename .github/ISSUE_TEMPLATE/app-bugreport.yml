name: Bug Report (App)
description: Create a bug report using the in-app tool
labels: ["app-bugreport"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! This form was pre-filled by the in-app tool.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, what you expected, and steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Diagnostic payload collected by the app. Please do not modify this section.
      render: markdown
    validations:
      required: true
