# mantis configuration
# To open this file for editing from within mantis: Ctrl+P → "Open config in editor"

show_hidden = false
tree_width = 28
word_wrap = false
line_numbers = true  # show line-number gutter in the content pane (toggle at runtime with L)
# tree_independent_scroll = false  # PageUp/PageDown and Home/End scroll the tree
#                                    viewport without moving the selection;
#                                    Up/Down still move the cursor (default: false)
scrollbar = true
scroll_percentage = true
in_file_search = true
# search_context_lines = 0  # lines of trailing context shown after each content match (default: 0)
# keep_search_query = false  # restore last search query when reopening search (default: false)
# watch = false              # auto-reload file content when the open file changes on disk (default: false)
# show_file_info = true      # show encoding and line-ending info in the status bar (default: true)
# palette_pin_recent = true   # pin the last-used command at the top of the Ctrl+P palette (default: true)
# palette_frequent_count = 3  # how many most-used commands to pin below it; 0 disables (default: 3)
indent_guides = true         # draw indentation guides (│) in the tree pane
# icons = false               # show Nerd Font file-type icons in the tree (requires a
                                # Nerd Font in your terminal and the iconize plugin enabled)

# --- git -------------------------------------------------------------------
# These options configure the BUILT-IN git integration (git-core feature).
# They do NOT affect the git-plugin (configured under [plugins]).
[git]
status = true             # show git status colours/markers in the tree
show_deleted = false      # include deleted files in git status
# show_untracked = true   # include untracked (??) files (default: true)
# show_ignored = false    # include ignored (!!) files (default: false)
# ignore_gitignore = false # respect .gitignore when listing files (default: false)

[git.diff]
# mode = "all"            # default diff source: all | staged | unstaged
# side_by_side = false    # start diff view in side-by-side layout

# Keybindings. Each action takes a list of key specs. A spec is a single
# character ("q", "?", "0") or a named key (Up, Down, Left, Right, Enter,
# Tab, Esc, Backspace, PageUp, PageDown, Home, End, Space), optionally
# prefixed with modifiers: "ctrl+c", "alt+.".
[keys]
quit = ["q", "ctrl+c"]
help = ["?"]
toggle_hidden = [".", "alt+."]
search_files = ["/"]
search_content = ["f"]
reload = ["r"]
switch_panel = ["Tab"]
file_history = ["H"]
theme_picker = ["t"]
git_mode_toggle = ["ctrl+g"]
git_mode_flat_toggle = ["F", "alt+g"]
command_palette = ["ctrl+p"]
open_in_editor = ["e"]
copy_path = ["y"]
copy_relative_path = ["Y"]
toggle_watch = ["W"]
fold_toggle = ["Space"]

# Navigation (shared by tree and content panels)
nav_up = ["Up", "k"]
nav_down = ["Down", "j"]

# Tree panel
tree_expand = ["Enter", "Right", "l"]
tree_collapse = ["Left", "h"]
tree_collapse_all = ["-"]
tree_expand_all = ["="]

# Content panel
content_left = ["Left"]
content_right = ["Right"]
content_top = ["g", "Home"]
content_bottom = ["G", "End"]
content_page_up = ["PageUp"]
content_page_down = ["PageDown"]
content_reset_col = ["0"]
toggle_wrap = ["z"]
toggle_raw_markdown = ["M"]
toggle_pretty_json = ["J"]
toggle_blame = ["b"]

# Theme. Select a preset via the theme picker (press `t` or Ctrl+P).
# Built-in presets: default, monokai, solarized, catppuccin, synthwave84.
# Full theme files are in ~/.config/mantis/themes/ — copy and edit one
# to create a custom theme. Each color accepts a name ("cyan", "reset") or
# hex ("#aabbcc").
# [theme]
# name = "default"
# transparent_background = false  # true = use terminal background color
# accent = "cyan"
# accent_alt = "yellow"
# dim = "darkgray"
# text = "white"
# dir = "blue"
# file = "reset"
# selection_bg = "#505050"
# selection_fg = "yellow"
# heading1 = "lightcyan"
# heading2 = "lightyellow"
# heading3 = "lightgreen"
# code = "lightyellow"
# diff_add = "green"
# diff_del = "red"
# syntax = "base16-ocean.dark"
#
# Plugin system. Each entry registers a subprocess-based plugin executable.
# Relative paths are resolved against the platform config directory:
#   Linux/macOS: $XDG_CONFIG_HOME/mantis/plugins/ (default: ~/.config/mantis/plugins/)
#   Windows:     %APPDATA%\mantis\plugins\
# Plugins communicate via newline-delimited JSON on stdin/stdout. See
# https://github.com/ansromanov/mantis for protocol docs.
# [plugins]
# my-plugin = { path = "my-plugin.sh", enabled = true }
#
# Bundled plugins (ship with mantis, installed to the plugin directory on first
# run). Uncomment to enable:
#   git-diff  = { path = "git-diff.sh" }
#   git-log   = { path = "git-log.sh" }
#   iconize   = { path = "iconize.sh" }  # file-type icons in the tree (requires icons = true)
#   markdown  = { path = "mantis-plugin-markdown" }
# git-diff: shows the working-tree diff (with ANSI colours from git) when a
#   tracked file is opened, replacing the file content.
# git-log:  press H to view the file's git log (--oneline --color=always) as a
#   static file. Loses the interactive commit-selection popup, but the log
#   retains git's ANSI colouring.
#   Note: H is also the default binding for the built-in file_history picker.
#   To prevent both from firing, add `file_history = []` under [keys].
# markdown: renders .md files with pulldown-cmark, responds to M keypress
#   (raw/rendered toggle) and theme changes.
#
# Syntax plugins register new syntax highlighting definitions. The highlighter
# auto-discovers .sublime-syntax files in {plugin_dir}/syntaxes/ (installed
# by mantis on first run).  You can also add explicit entries:
#   terraform = { kind = "syntax", syntax_file = "syntaxes/terraform.sublime-syntax",
#                 extensions = ["tf", "tfvars"] }
#
# git-plugin: unified git status / repo info / diff / log / blame via a single
#   subprocess. Replaces the built-in git integration when `git-core` is
#   disabled in the binary (currently the built-in git integration runs by
#   default; this plugin is an alternative for testing).
#
# [plugins]
# git-plugin = { path = "git-plugin.sh" }
