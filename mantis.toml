# ============================================================================
#  mantis configuration
# ============================================================================
# This is the annotated reference: every option with its default value.
# Open it from inside mantis with  Ctrl+P → "Open config in editor".
#
# Your own overrides live in  mantis.toml  next to this file. Keep that file
# minimal — set only what you want to change; everything else falls back to the
# defaults shown here. Precedence: project-local ./mantis.toml (and ancestors)
# overrides the global config.
#
# Sections below: [general] keys first (must precede any table), then
# [tree] [content] [search] [git] [statusbar] [keys] [theme] [plugins].
# ============================================================================


# --- general ----------------------------------------------------------------
# Top-level options. These must appear before the first [table] header.

recent_files_count = 10      # how many recently-opened files to remember
palette_pin_recent = true    # pin the last-used command atop the Ctrl+P palette
palette_frequent_count = 3   # most-used commands pinned below it; 0 disables


# --- tree -------------------------------------------------------------------
# The left-hand file tree.
[tree]
show_hidden = false          # show dotfiles / hidden entries
width = 28                   # pane width in columns
independent_scroll = false   # PageUp/Down scroll the viewport without moving
                             #   the selection (Up/Down still move the cursor)
indent_guides = true         # draw indentation guides (│)
icons = false                # Nerd Font file-type icons (needs a Nerd Font in
                             #   the terminal AND the iconize plugin enabled)


# --- content ----------------------------------------------------------------
# The right-hand file/preview pane.
[content]
word_wrap = false            # wrap long lines (toggle at runtime with z)
line_numbers = true          # line-number gutter (toggle at runtime with L)
scrollbar = true             # show a scrollbar
scroll_percentage = true     # show scroll-position percentage
watch = false                # auto-reload the open file when it changes on disk
                             #   (toggle at runtime with W)
show_file_info = true        # encoding + line-ending info in the status bar
prettify_size_limit = 10485760  # max bytes for JSON/YAML pretty-printing;
                                 #   larger files show as raw text (10 MiB default)


# --- search -----------------------------------------------------------------
[search]
in_file_search = true        # enable in-file incremental search via `/`
context_lines = 0            # trailing context lines shown after each match
keep_query = false           # restore the last query when reopening search


# --- git --------------------------------------------------------------------
# Built-in git integration (always available; not a plugin).
[git]
status = true                # show git status colours/markers in the tree
show_deleted = false         # include deleted files in git status
show_untracked = true        # include untracked (??) files
show_ignored = false         # include ignored (!!) files
ignore_gitignore = false     # respect .gitignore when listing files

[git.diff]
mode = "all"                 # default diff source: "all" | "staged" | "unstaged"
side_by_side = false         # start the diff view in side-by-side layout


# --- status bar -------------------------------------------------------------
# Segments shown on each side. Both unset (default): all segments visible, the
# historical default right set ["lnum","type","git","version"] on the right,
# everything else left. Either set: explicit allowlist — only listed ids
# render on their configured side, in listed order; unlisted ids are hidden.
# Set both to empty lists for an empty bar.
# Valid ids: hint badges scroll lnum type fileinfo git errors folds message version update
[statusbar]
# left = ["hint", "badges", "scroll", "lnum", "type", "fileinfo", "git", "errors", "folds", "message"]
# right = ["lnum", "type", "git", "version", "update"]


# --- updates ----------------------------------------------------------------
# Optional background update check.
[updates]
check = true                 # check for newer releases (at most once per day)


# --- telemetry --------------------------------------------------------------
# Anonymous, local-only usage telemetry. When enabled, whitelisted events
# (session start/end, invoked command ids) are appended to a size-capped log
# under the state directory (see the Telemetry doc page). Nothing is ever
# sent anywhere, and no paths, file names, or typed text are recorded.
[telemetry]
enabled = false              # collect anonymous usage events locally


# --- keybindings ------------------------------------------------------------
# Each action takes a list of key specs. A spec is a single character ("q",
# "?", "0") or a named key (Up Down Left Right Enter Tab Esc Backspace PageUp
# PageDown Home End Space), optionally prefixed with modifiers: "ctrl+c".
# Set an action to [] to unbind it.
[keys]

# global
quit = ["q", "ctrl+c"]
help = ["?"]
command_palette = ["ctrl+p"]
reload = ["r"]
switch_panel = ["Tab"]
toggle_hidden = [".", "alt+."]
theme_picker = ["t"]
plugin_picker = ["p"]
open_in_editor = ["e"]
copy_path = ["y"]
copy_relative_path = ["Y"]
toggle_watch = ["W"]
recent_files = ["ctrl+o"]
file_history = ["H"]
goto_line = [":"]
git_mode_toggle = ["ctrl+g"]
git_mode_flat_toggle = ["F", "alt+g"]

# search
search_files = ["/"]         # in-file incremental search
find_files = ["ctrl+f"]      # fuzzy file-name picker
search_content = ["f"]       # project-wide content search

# navigation (shared by tree and content panes)
nav_up = ["Up", "k"]
nav_down = ["Down", "j"]

# tree pane
tree_expand = ["Enter", "Right", "l"]
tree_collapse = ["Left", "h"]
tree_up_dir = ["Backspace"]
tree_collapse_all = ["-"]
tree_expand_all = ["="]
fold_toggle = ["Space"]

# content pane
content_left = ["Left"]
content_right = ["Right"]
content_top = ["g", "Home"]
content_bottom = ["G", "End"]
content_page_up = ["PageUp"]
content_page_down = ["PageDown"]
content_reset_col = ["0"]
toggle_wrap = ["z"]
toggle_line_numbers = ["L"]
toggle_pretty_json = ["J"]
toggle_blame = ["b"]         # inline blame for the whole file
blame_line = ["B"]           # blame popup for the current line

# diff view
toggle_diff_side_by_side = ["D"]
toggle_diff_staged = ["S"]
diff_hunk_next = ["n"]
diff_hunk_prev = ["N"]


# --- theme ------------------------------------------------------------------
# Pick a preset with the theme picker (press `t`). Built-in presets:
#   default  monokai  solarized  catppuccin  synthwave84
# Full theme files live in ~/.config/mantis/themes/ — copy one to customise.
# Every key below is OPTIONAL and inherits from the active preset when unset;
# uncomment only the colours you want to override. Values are a colour name
# ("cyan", "reset") or hex ("#aabbcc").
# [theme]
# name = "default"                  # preset to load
# auto_detect = true                # automatically pick light/dark default theme based on background
# transparent_background = false    # true = let the terminal background show
# syntax = "base16-ocean.dark"      # syntect highlighting theme
#
# accent = "cyan"
# accent_alt = "yellow"
# dim = "darkgray"
# text = "white"
# dir = "blue"
# file = "reset"
# selection_bg = "#505050"
# selection_fg = "yellow"
# heading1 = "lightcyan"
# heading2 = "lightyellow"
# heading3 = "lightgreen"
# code = "lightyellow"
# diff_add = "green"
# diff_del = "red"
# git_clean = "green"               # tree/status colours for git states
# git_dirty = "yellow"
# git_conflict = "red"
# git_progress = "magenta"
# breadcrumb_fg = "white"           # path breadcrumb bar
# breadcrumb_bg = "#303030"
# active_line_bg = "#303030"        # highlight under the content cursor line


# --- plugins ----------------------------------------------------------------
# Subprocess plugins extend mantis over newline-delimited JSON on stdin/stdout.
# Relative paths resolve against the plugin directory:
#   Linux/macOS: ~/.config/mantis/plugins/   Windows: %APPDATA%\mantis\plugins\
# Protocol docs: https://github.com/ansromanov/mantis
#
# Entry fields:
#   path        executable (process) or .sublime-syntax file (syntax)  [required]
#   enabled     spawn at startup; default true
#   kind        "process" (default) | "syntax"
#   extensions  file extensions a syntax plugin handles, e.g. ["tf"]
#   syntax_file path to the .sublime-syntax file (syntax plugins)
#   events      manifest events to subscribe to; empty = all
#
# Bundled plugins (installed to the plugin dir on first run). Enable per entry:
#
# [plugins.iconize]                 # Nerd Font file-type icons (set tree.icons = true)
# enabled = true
# path = "iconize"
#
# [plugins.markdown]                # render .md with pulldown-cmark; M toggles raw
# enabled = true
# path = "markdown"
#
# Syntax plugin example (extra highlighting; no subprocess spawned):
# [plugins.terraform]
# enabled = true
# kind = "syntax"
# path = "syntaxes/terraform.sublime-syntax"
# syntax_file = "syntaxes/terraform.sublime-syntax"
# extensions = ["tf", "tfvars"]
